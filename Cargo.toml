[package]
name = "zenresize"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "AGPL-3.0-or-later"
description = "High-quality image resampling with 31 filters, streaming API, and SIMD acceleration"
repository = "https://github.com/imazen/zenresize"
keywords = ["image", "resize", "resampling", "simd", "lanczos"]
categories = ["graphics", "multimedia::images", "no-std"]

[features]
default = ["std"]
std = ["archmage/std", "linear-srgb/std"]
avx512 = ["archmage/avx512"]
imgref = ["dep:imgref", "dep:rgb"]

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(feature, values("avx512"))'] }

[dependencies]
archmage = { version = "0.6", path = "../archmage", default-features = false, features = ["macros"] }
linear-srgb = { version = "0.4", path = "../linear-srgb", default-features = false }
hoisted-bounds = { path = "../hoisted-bounds", default-features = false, features = ["archmage"] }
imgref = { version = "1.12", optional = true }
rgb = { version = "0.8", optional = true, default-features = false }

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }
image = { version = "0.25", default-features = false, features = ["png"] }

# Competitors
pic-scale = "0.6"
fast_image_resize = "6"
resize = "0.8"
rgb = "0.8"

[[bench]]
name = "resize_bench"
harness = false

[[bench]]
name = "paired_bench"
harness = false

[[bench]]
name = "profile_srgb"
harness = false
